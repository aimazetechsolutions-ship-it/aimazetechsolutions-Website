<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AimAze Video Test</title><style>body{font-family:Arial,sans-serif;background:#0f172a;color:#fff;padding:24px}h1{margin-bottom:8px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px}.card{background:#111827;border:1px solid #334155;border-radius:16px;padding:14px}video{width:100%;height:150px;object-fit:cover;border-radius:12px;background:#000}.ok{color:#22c55e}.path{font-size:12px;color:#94a3b8}</style></head><body><h1>AimAze Video Test Page</h1><p>Open this after deployment. If each card shows a moving video, all MP4 files are correctly uploaded.</p><div class="grid" id="grid"></div><script>const pages=['home','about','services','odoo','industries','portfolio','blog','contact'];const grid=document.getElementById('grid');grid.innerHTML=pages.map(p=>`<div class="card"><h3>${p}.mp4</h3><video controls muted loop playsinline preload="metadata" poster="assets/videos/${p}-poster.jpg"><source src="assets/videos/${p}.mp4?v=22" type="video/mp4"></video><p class="path">assets/videos/${p}.mp4</p></div>`).join('');</script></body></html>

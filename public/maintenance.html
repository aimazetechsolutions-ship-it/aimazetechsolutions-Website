<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>AimAze Tech Solutions | Maintenance</title>
    <link rel="icon" href="/assets/aimaze-logo-transparent.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
    <style>
      :root {
        --cyan: #27c7d7;
        --blue: #3f83df;
        --purple: #534ab7;
        --white: #ffffff;
        --muted: #6b7280;
        --dark: #101729;
        --bg: #ffffff;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--dark);
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      .maintenance {
        display: grid;
        width: min(760px, calc(100% - 36px));
        min-height: 100vh;
        align-content: center;
        justify-items: start;
        margin: 0 auto;
        padding: 60px 0;
      }
      .maintenance img {
        width: min(280px, 74vw);
        margin-bottom: 34px;
      }
      .eyebrow {
        margin: 0 0 12px;
        color: var(--purple);
        font-size: 0.82rem;
        font-weight: 900;
        letter-spacing: 0;
        text-transform: uppercase;
      }
      h1 {
        font-family: 'Syne', 'Inter', sans-serif;
        max-width: 680px;
        margin: 0 0 18px;
        font-size: clamp(3rem, 8vw, 6rem);
        line-height: 0.98;
        letter-spacing: 0;
        font-weight: 800;
        color: var(--dark);
      }
      .copy {
        max-width: 620px;
        margin: 0 0 28px;
        color: var(--muted);
        font-size: 1.18rem;
        line-height: 1.6;
      }
      .maintenance a {
        display: inline-flex;
        min-height: 50px;
        align-items: center;
        justify-content: center;
        padding: 14px 22px;
        border-radius: 6px;
        color: var(--white);
        font-weight: 900;
        text-decoration: none;
        background: linear-gradient(135deg, var(--cyan), var(--blue) 54%, var(--purple));
        box-shadow: 0 16px 38px rgba(63, 131, 223, 0.24);
      }
      @media (max-width: 600px) {
        .maintenance { justify-items: stretch; }
        .maintenance a { width: 100%; }
      }
    </style>
  </head>
  <body>
    <main class="maintenance">
      <img src="/assets/aimaze-logo-transparent.png" alt="AimAze Tech Solutions logo" />
      <p class="eyebrow">Website update in progress</p>
      <h1>We'll be back online soon.</h1>
      <p class="copy">
        AimAze Tech Solutions is updating the website experience. For urgent
        inquiries, please contact us by email.
      </p>
      <a href="mailto:info@aimazetechsolutions.com">info@aimazetechsolutions.com</a>
    </main>
  </body>
</html>

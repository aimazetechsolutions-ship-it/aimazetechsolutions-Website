backend:
  name: github
  repo: aimazetechsolutions-ship-it/aimazetechsolutions
  branch: main

media_folder: "assets/uploads"
public_folder: "assets/uploads"

collections:
  - name: "website"
    label: "Website"
    files:
      - name: "content"
        label: "Website Content"
        file: "content.json"
        format: "json"
        fields:
          - { label: "Visual Editor Type", name: "type", widget: "hidden", default: "WebsiteContent" }

          - label: "Site"
            name: "site"
            widget: "object"
            fields:
              - { label: "Browser Title", name: "title", widget: "string" }
              - { label: "SEO Description", name: "description", widget: "text" }
              - { label: "Domain", name: "domain", widget: "string" }
              - { label: "Logo", name: "logo", widget: "image", required: false }
              - { label: "Social Share Image", name: "ogImage", widget: "image", required: false }
              - { label: "Contact Email", name: "email", widget: "string" }
              - { label: "Footer Text", name: "footerText", widget: "string" }

          - label: "Theme Colors"
            name: "theme"
            widget: "object"
            fields:
              - { label: "Cyan", name: "cyan", widget: "string", hint: "Hex color, for example #27c7d7" }
              - { label: "Blue", name: "blue", widget: "string", hint: "Hex color, for example #3f83df" }
              - { label: "Orange", name: "orange", widget: "string", hint: "Hex color, for example #ff8847" }
              - { label: "Purple", name: "purple", widget: "string", hint: "Hex color, for example #70419a" }
              - { label: "Ink / Dark Text", name: "ink", widget: "string", hint: "Hex color, for example #141b2c" }
              - { label: "Body Text", name: "text", widget: "string", hint: "Hex color, for example #344154" }
              - { label: "Muted Text", name: "muted", widget: "string", hint: "Hex color, for example #6d7789" }
              - { label: "Soft Background", name: "soft", widget: "string", hint: "Hex color, for example #f5fbfd" }

          - label: "Typography / Fonts"
            name: "typography"
            widget: "object"
            fields:
              - { label: "Google Font CSS URL", name: "googleFontUrl", widget: "string", required: false, hint: "Example: https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" }
              - { label: "Body Font Family", name: "bodyFont", widget: "string", hint: "Example: Inter, Arial, Helvetica, sans-serif" }
              - { label: "Heading Font Family", name: "headingFont", widget: "string", hint: "Example: Inter, Arial, Helvetica, sans-serif" }
              - { label: "Base Body Text Size", name: "bodySize", widget: "string", hint: "Example: 16px or 1rem" }
              - { label: "Top Strip Text Size", name: "topStripSize", widget: "string", hint: "Example: 0.88rem" }
              - { label: "Navigation Text Size", name: "navSize", widget: "string", hint: "Example: 0.95rem" }
              - { label: "Small Label / Eyebrow Size", name: "eyebrowSize", widget: "string", hint: "Example: 0.78rem" }
              - { label: "Hero Title Minimum Size", name: "heroTitleMin", widget: "string", hint: "Example: 3rem" }
              - { label: "Hero Title Maximum Size", name: "heroTitleMax", widget: "string", hint: "Example: 6rem" }
              - { label: "Hero Paragraph Size", name: "heroCopySize", widget: "string", hint: "Example: 1.18rem" }
              - { label: "Page Title Minimum Size", name: "pageTitleMin", widget: "string", hint: "Example: 3rem" }
              - { label: "Page Title Maximum Size", name: "pageTitleMax", widget: "string", hint: "Example: 6rem" }
              - { label: "Section Heading Minimum Size", name: "sectionTitleMin", widget: "string", hint: "Example: 2rem" }
              - { label: "Section Heading Maximum Size", name: "sectionTitleMax", widget: "string", hint: "Example: 4rem" }
              - { label: "Paragraph Text Size", name: "paragraphSize", widget: "string", hint: "Example: 1.06rem" }
              - { label: "Card Title Size", name: "cardTitleSize", widget: "string", hint: "Example: 1.24rem" }
              - { label: "Card Text Size", name: "cardTextSize", widget: "string", hint: "Example: 1rem" }
              - { label: "Tags / Pills Text Size", name: "tagSize", widget: "string", hint: "Example: 0.92rem" }
              - { label: "Stats Number Minimum Size", name: "statsValueMin", widget: "string", hint: "Example: 2.4rem" }
              - { label: "Stats Number Maximum Size", name: "statsValueMax", widget: "string", hint: "Example: 3.8rem" }
              - { label: "Stats Label Size", name: "statsLabelSize", widget: "string", hint: "Example: 1rem" }
              - { label: "Button Text Size", name: "buttonSize", widget: "string", hint: "Example: 1rem" }
              - { label: "Form Text Size", name: "formSize", widget: "string", hint: "Example: 1rem" }
              - { label: "Footer Text Size", name: "footerSize", widget: "string", hint: "Example: 1rem" }

          - label: "Section Visibility"
            name: "sections"
            widget: "object"
            fields:
              - { label: "Show About", name: "about", widget: "boolean", default: true }
              - { label: "Show Operational Challenges", name: "problems", widget: "boolean", default: true }
              - { label: "Show Odoo Platform", name: "platform", widget: "boolean", default: true }
              - { label: "Show Stats", name: "stats", widget: "boolean", default: true }
              - { label: "Show Services", name: "services", widget: "boolean", default: true }
              - { label: "Show Industries", name: "industries", widget: "boolean", default: true }
              - { label: "Show Process", name: "process", widget: "boolean", default: true }
              - { label: "Show Video", name: "video", widget: "boolean", default: true }
              - { label: "Show Gallery", name: "gallery", widget: "boolean", default: true }
              - { label: "Show Testimonials", name: "testimonials", widget: "boolean", default: true }
              - { label: "Show Case Studies", name: "caseStudies", widget: "boolean", default: true }
              - { label: "Show Blog / News", name: "blog", widget: "boolean", default: true }
              - { label: "Show FAQ", name: "faq", widget: "boolean", default: true }
              - { label: "Show Contact", name: "contact", widget: "boolean", default: true }
              - { label: "Show Custom Sections", name: "customSections", widget: "boolean", default: true }

          - label: "Top Strip"
            name: "topStrip"
            widget: "object"
            fields:
              - { label: "Text", name: "text", widget: "string" }
              - { label: "Link Text", name: "linkText", widget: "string" }
              - { label: "Link URL", name: "linkHref", widget: "string" }

          - label: "Navigation"
            name: "navigation"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Link URL", name: "href", widget: "string" }

          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Copy", name: "copy", widget: "text" }
              - label: "Points"
                name: "points"
                widget: "list"
                field: { label: "Point", name: "point", widget: "string" }
              - label: "Primary Button"
                name: "primaryButton"
                widget: "object"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "Link URL", name: "href", widget: "string" }
              - label: "Secondary Button"
                name: "secondaryButton"
                widget: "object"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "Link URL", name: "href", widget: "string" }
              - { label: "Show Hero Background Image", name: "showBackgroundImage", widget: "boolean", default: true, required: false }
              - { label: "Show Hero Main Image", name: "showMainImage", widget: "boolean", default: true, required: false }
              - { label: "Show Extra Hero Images", name: "showExtraImages", widget: "boolean", default: true, required: false }
              - { label: "Show Floating Info Cards", name: "showFloatingCards", widget: "boolean", default: true, required: false }
              - { label: "Hero Image", name: "image", widget: "image", required: false }
              - { label: "Hero Background Image", name: "backgroundImage", widget: "image", required: false, hint: "Large tech/background image shown behind the top home-page hero text." }
              - { label: "Hero Image Alt Text", name: "imageAlt", widget: "string" }
              - { label: "Card Title", name: "cardTitle", widget: "string" }
              - { label: "Card Text", name: "cardText", widget: "string" }
              - { label: "Hero Video URL", name: "videoUrl", widget: "string", required: false, hint: "YouTube, Vimeo, or direct MP4 URL." }
              - label: "Extra Hero Images"
                name: "gallery"
                widget: "list"
                required: false
                fields:
                  - { label: "Image", name: "image", widget: "image", required: false }
                  - { label: "Alt Text", name: "alt", widget: "string", required: false }

          - label: "About"
            name: "about"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - label: "Paragraphs"
                name: "paragraphs"
                widget: "list"
                field: { label: "Paragraph", name: "paragraph", widget: "text" }

          - label: "Operational Challenges"
            name: "problems"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Copy", name: "copy", widget: "text" }
              - label: "Items"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Number", name: "number", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Text", name: "text", widget: "text" }

          - label: "Odoo Platform"
            name: "platform"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Copy", name: "copy", widget: "text" }
              - label: "Bullets"
                name: "bullets"
                widget: "list"
                field: { label: "Bullet", name: "bullet", widget: "string" }
              - { label: "Guide Eyebrow", name: "guideEyebrow", widget: "string" }
              - { label: "Guide Title", name: "guideTitle", widget: "string" }
              - label: "Guide Items"
                name: "guideItems"
                widget: "list"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Text", name: "text", widget: "string" }

          - label: "Stats"
            name: "stats"
            widget: "list"
            fields:
              - { label: "Value", name: "value", widget: "string" }
              - { label: "Label", name: "label", widget: "string" }

          - label: "Services"
            name: "services"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Copy", name: "copy", widget: "text" }
              - label: "Service Items"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Short Label", name: "short", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Text", name: "text", widget: "text" }
                  - { label: "Image", name: "image", widget: "image", required: false }
                  - { label: "Video URL", name: "videoUrl", widget: "string", required: false, hint: "YouTube, Vimeo, or direct MP4 URL." }

          - label: "Industries"
            name: "industries"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - label: "Industry Items"
                name: "items"
                widget: "list"
                field: { label: "Industry", name: "industry", widget: "string" }

          - label: "Process"
            name: "process"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - label: "Steps"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Text", name: "text", widget: "text" }

          - label: "FAQ"
            name: "faq"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - label: "Questions"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Question", name: "question", widget: "string" }
                  - { label: "Answer", name: "answer", widget: "text" }

          - label: "Video Section"
            name: "video"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Copy", name: "copy", widget: "text" }
              - { label: "Video URL", name: "videoUrl", widget: "string", required: false, hint: "YouTube, Vimeo, or direct MP4 URL." }
              - { label: "Poster Image", name: "posterImage", widget: "image", required: false }

          - label: "Gallery / Portfolio"
            name: "gallery"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Copy", name: "copy", widget: "text" }
              - label: "Gallery Items"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Text", name: "text", widget: "text", required: false }
                  - { label: "Image", name: "image", widget: "image", required: false }
                  - { label: "Alt Text", name: "alt", widget: "string", required: false }

          - label: "Testimonials"
            name: "testimonials"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - label: "Testimonials"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Quote", name: "quote", widget: "text" }
                  - { label: "Name", name: "name", widget: "string" }
                  - { label: "Role / Company", name: "role", widget: "string", required: false }
                  - { label: "Photo", name: "image", widget: "image", required: false }

          - label: "Case Studies"
            name: "caseStudies"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - label: "Case Study Items"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Industry", name: "industry", widget: "string", required: false }
                  - { label: "Summary", name: "summary", widget: "text" }
                  - { label: "Result", name: "result", widget: "string", required: false }
                  - { label: "Image", name: "image", widget: "image", required: false }

          - label: "Blog / News"
            name: "blog"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - label: "Posts"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false, required: false }
                  - { label: "Category", name: "category", widget: "string", required: false }
                  - { label: "Excerpt", name: "excerpt", widget: "text" }
                  - { label: "Image", name: "image", widget: "image", required: false }
                  - { label: "Read More Link", name: "link", widget: "string", required: false }

          - label: "Custom Sections"
            name: "customSections"
            widget: "list"
            fields:
              - { label: "Enabled", name: "enabled", widget: "boolean", default: true }
              - { label: "Eyebrow", name: "eyebrow", widget: "string", required: false }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Copy", name: "copy", widget: "text", required: false }
              - { label: "Image", name: "image", widget: "image", required: false }
              - { label: "Video URL", name: "videoUrl", widget: "string", required: false, hint: "YouTube, Vimeo, or direct MP4 URL." }
              - label: "Items"
                name: "items"
                widget: "list"
                required: false
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Text", name: "text", widget: "text" }

          - label: "Contact"
            name: "contact"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Copy", name: "copy", widget: "text" }
              - { label: "Form Button", name: "formButton", widget: "string" }
